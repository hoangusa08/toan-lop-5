<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Thể Tích Hòn Đá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ngăn chọn văn bản trên các thành phần UI */
        body { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col items-center p-4 font-sans">

    <!-- KHU VỰC BỂ NƯỚC (CANVAS SVG) -->
    <div class="w-full max-w-3xl aspect-video bg-white rounded-xl shadow-lg flex justify-center items-center overflow-hidden relative mt-4" id="svg-wrapper">
        <!-- SVG sẽ được render bằng JavaScript vào đây -->
    </div>

    <!-- BẢNG ĐIỀU KHIỂN DƯỚI -->
    <div class="w-full max-w-3xl bg-white p-6 rounded-xl shadow-lg mt-6 flex flex-col gap-6">
        
        <!-- THANH KÉO (SLIDER) -->
        <div>
            <div class="flex justify-between items-end mb-2">
                <span class="font-semibold text-gray-700">Thả hòn đá</span>
                <span id="water-display" class="text-xl font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg border border-blue-100 shadow-sm">
                    Nước: 3.0 dm
                </span>
            </div>
            
            <input 
                type="range" 
                id="progress-slider"
                min="0" 
                max="100" 
                step="0.1"
                value="0" 
                class="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-500"
            />
            
            <div class="flex justify-between text-sm text-gray-500 mt-2 font-medium">
                <span>Mực nước: 3 dm</span>
                <span>Mực nước: 4 dm</span>
            </div>
        </div>

        <!-- NÚT ĐIỀU KHIỂN -->
        <div class="flex justify-center gap-4">
            <button 
                id="btn-reset"
                class="px-6 py-2.5 rounded-lg font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors flex items-center gap-2"
            >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                Làm lại
            </button>
            
            <button 
                id="btn-play"
                class="px-8 py-2.5 rounded-lg font-bold text-white transition-colors flex items-center gap-2 shadow-md bg-blue-600 hover:bg-blue-700"
            >
                <!-- SVG Icon Play mặc định -->
                <svg id="icon-play" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                <svg id="icon-pause" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                <span id="text-play">Tự động chạy</span>
            </button>
        </div>

    </div>

    <script>
        // --- TRẠNG THÁI (STATE) ---
        let progress = 0; // 0 to 100
        let isPlaying = false;
        let animationRef = null;

        // --- HẰNG SỐ CẤU HÌNH 3D (OBLIQUE PROJECTION) ---
        const scale = 45; // 1 dm = 45px
        const baseX = 200; // Lề trái mặt trước
        const baseY = 460; // Đáy mặt trước
        const dX = 65; // Độ sâu nghiêng trục X
        const dY = -45; // Độ sâu nghiêng trục Y

        // Kích thước bể
        const W = 10; // Dài 10dm
        const H = 6;  // Cao 6dm
        const D = 1;  // Tỷ lệ chiều sâu (100%)
        
        // Tọa độ Hòn đá
        const stoneX = 5;
        const stoneDepth = 0.5;

        // --- CÁC PHẦN TỬ DOM ---
        const svgWrapper = document.getElementById('svg-wrapper');
        const slider = document.getElementById('progress-slider');
        const waterDisplay = document.getElementById('water-display');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const textPlay = document.getElementById('text-play');

        // Hàm tính tọa độ điểm 3D
        const pX = (x, z, d) => baseX + x * scale + d * dX;
        const pY = (x, z, d) => baseY - z * scale + d * dY;
        const pt = (x, z, d) => `${pX(x, z, d)},${pY(x, z, d)}`;

        // --- VÒNG LẶP ANIMATION ---
        function updateProgress() {
            if (!isPlaying) return;
            
            progress += 0.15; // Tốc độ thả từ từ
            
            if (progress >= 100) {
                progress = 100;
                isPlaying = false;
            }
            
            render();
            
            if (isPlaying) {
                animationRef = requestAnimationFrame(updateProgress);
            }
        }

        function togglePlay() {
            if (progress >= 100) {
                progress = 0;
            }
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                animationRef = requestAnimationFrame(updateProgress);
            } else {
                cancelAnimationFrame(animationRef);
            }
            render();
        }

        function resetSimulation() {
            isPlaying = false;
            progress = 0;
            cancelAnimationFrame(animationRef);
            render();
        }

        function onSliderChange(e) {
            isPlaying = false;
            progress = parseFloat(e.target.value);
            cancelAnimationFrame(animationRef);
            render();
        }

        // --- HÀM VẼ GIAO DIỆN CHÍNH (RENDER) ---
        function render() {
            // 1. LOGIC TOÁN HỌC
            let waterLevel = 3;
            let stoneZ = 7;
            let currentWaterDisplay = 3.0;

            if (progress <= 20) {
                // 0 - 20%: Đá rơi, nước giữ nguyên 3dm
                waterLevel = 3;
                stoneZ = 7 - (progress / 20) * 4;
                currentWaterDisplay = 3.0;
            } else {
                // 20% - 100%: Đá chìm, nước dâng từ 3 -> 4
                const pPhase = (progress - 20) / 80;
                waterLevel = 3 + pPhase * 1;
                stoneZ = 3 - pPhase * 2.2; 
                currentWaterDisplay = 3 + pPhase * 1;
            }

            // 2. CẬP NHẬT UI CONTROLS
            slider.value = progress;
            waterDisplay.innerText = `Nước: ${currentWaterDisplay.toFixed(1)} dm`;

            if (isPlaying) {
                btnPlay.className = "px-8 py-2.5 rounded-lg font-bold text-white transition-colors flex items-center gap-2 shadow-md bg-orange-500 hover:bg-orange-600";
                iconPlay.classList.add("hidden");
                iconPause.classList.remove("hidden");
                textPlay.innerText = "Tạm dừng";
            } else {
                btnPlay.className = "px-8 py-2.5 rounded-lg font-bold text-white transition-colors flex items-center gap-2 shadow-md bg-blue-600 hover:bg-blue-700";
                iconPlay.classList.remove("hidden");
                iconPause.classList.add("hidden");
                textPlay.innerText = progress >= 100 ? 'Chạy lại' : 'Tự động chạy';
            }

            // 3. TẠO CHUỖI SVG VÀ INJECT VÀO DOM
            // Logic hiệu ứng sóng
            let waveSVG = '';
            if (progress > 18 && progress < 50) {
                waveSVG = `
                    <g>
                        <polygon 
                            points="
                                ${pX(stoneX - (progress-18)*0.5, waterLevel, stoneDepth - (progress-18)*0.02)} 
                                ${pX(stoneX, waterLevel, stoneDepth - (progress-18)*0.04)} 
                                ${pX(stoneX + (progress-18)*0.5, waterLevel, stoneDepth - (progress-18)*0.02)} 
                                ${pX(stoneX, waterLevel, stoneDepth)}
                            " 
                            fill="none" stroke="white" stroke-width="2" opacity="${Math.max(0, 1 - (progress - 18) / 32)}" 
                        />
                        <ellipse 
                            cx="${pX(stoneX, waterLevel, stoneDepth)}" 
                            cy="${pY(stoneX, waterLevel, stoneDepth)}" 
                            rx="${25 + (progress - 18) * 3}" ry="${10 + (progress - 18) * 1.5}" 
                            fill="none" stroke="rgba(255,255,255,0.8)" 
                            stroke-width="${Math.max(0, 3 - (progress - 18) * 0.1)}"
                            opacity="${Math.max(0, 1 - (progress - 18) / 32)}"
                        />
                    </g>
                `;
            }

            // Logic bong bóng
            let bubbleSVG = '';
            if (progress > 20 && progress < 100) {
                const bubbles = [
                    { x: -15, y: -5, speed: 0.15, size: 3.5 },
                    { x: 10, y: -2, speed: 0.2, size: 2.5 },
                    { x: -5, y: 10, speed: 0.1, size: 4 },
                    { x: 15, y: 8, speed: 0.25, size: 3 }
                ];
                bubbleSVG = `<g fill="rgba(255,255,255,0.7)">`;
                bubbles.forEach(bubble => {
                    const bZ = stoneZ + (progress - 20) * bubble.speed;
                    if (bZ <= waterLevel) {
                        bubbleSVG += `<circle cx="${pX(stoneX, bZ, stoneDepth) + bubble.x}" cy="${pY(stoneX, bZ, stoneDepth) + bubble.y}" r="${bubble.size}" />`;
                    }
                });
                bubbleSVG += `</g>`;
            }

            svgWrapper.innerHTML = `
                <svg viewBox="0 0 800 550" class="w-full h-full">
                    
                    <!-- TIÊU ĐỀ -->
                    <text x="400" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#1f2937">MÔ PHỎNG THỂ TÍCH HÒN ĐÁ</text>
                    <text x="400" y="80" text-anchor="middle" font-size="16" fill="#6b7280">Quan sát sự thay đổi mực nước khi thả hòn đá vào bể</text>

                    <defs>
                        <linearGradient id="waterGradientFront" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6" />
                            <stop offset="100%" stop-color="#0284c7" stop-opacity="0.9" />
                        </linearGradient>
                        <linearGradient id="glassReflection" x1="0" y1="0" x2="1" y2="0">
                            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
                            <stop offset="15%" stop-color="#ffffff" stop-opacity="0.0" />
                            <stop offset="85%" stop-color="#ffffff" stop-opacity="0.0" />
                            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
                        </linearGradient>
                        <radialGradient id="rockGradient" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#a8a29e" />
                            <stop offset="60%" stop-color="#57534e" />
                            <stop offset="100%" stop-color="#292524" />
                        </radialGradient>
                    </defs>

                    <!-- BÓNG ĐỔ DƯỚI ĐÁY BỂ -->
                    <ellipse cx="${pX(W/2, 0, 0.5)}" cy="${pY(W/2, 0, 0.5) + 15}" rx="${(W/2) * scale + 20}" ry="25" fill="rgba(0,0,0,0.15)" />

                    <!-- 1. MẶT SAU & BÊN TRONG BỂ KÍNH -->
                    <polygon points="${pt(0,0,D)} ${pt(W,0,D)} ${pt(W,H,D)} ${pt(0,H,D)}" fill="#f8fafc" stroke="#e2e8f0" />
                    <path d="M ${pt(0,2,D)} L ${pt(W,2,D)} M ${pt(0,4,D)} L ${pt(W,4,D)} M ${pt(W/2,0,D)} L ${pt(W/2,H,D)}" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" />
                    <polygon points="${pt(0,0,0)} ${pt(W,0,0)} ${pt(W,0,D)} ${pt(0,0,D)}" fill="#f1f5f9" stroke="#e2e8f0" />
                    <polygon points="${pt(0,0,0)} ${pt(0,0,D)} ${pt(0,H,D)} ${pt(0,H,0)}" fill="#f8fafc" opacity="0.8" stroke="#e2e8f0" />

                    <!-- 2. KHỐI NƯỚC (PHẦN SAU VÀ ĐÁY) -->
                    <g style="transition: all 0.1s linear">
                        <polygon points="${pt(0,0,D)} ${pt(W,0,D)} ${pt(W,waterLevel,D)} ${pt(0,waterLevel,D)}" fill="#0284c7" opacity="0.3" />
                        <polygon points="${pt(0,0,0)} ${pt(0,0,D)} ${pt(0,waterLevel,D)} ${pt(0,waterLevel,0)}" fill="#0369a1" opacity="0.2" />
                    </g>

                    <!-- 3. HÒN ĐÁ & CÁC HIỆU ỨNG -->
                    <ellipse 
                        cx="${pX(stoneX, 0, stoneDepth)}" 
                        cy="${pY(stoneX, 0, stoneDepth)}" 
                        rx="${20 + stoneZ * 2}" 
                        ry="${10 + stoneZ * 1}" 
                        fill="rgba(0,0,0,0.3)" 
                        opacity="${Math.max(0.1, 1 - stoneZ / 8)}"
                    />

                    <g transform="translate(${pX(stoneX, stoneZ, stoneDepth)}, ${pY(stoneX, stoneZ, stoneDepth)})">
                        <path d="M -5 -30 C 20 -35 40 -10 30 15 C 20 40 -15 35 -30 20 C -45 5 -30 -25 -5 -30 Z" fill="url(#rockGradient)" />
                        <path d="M -20 -15 L 5 5 L 25 10" stroke="#44403c" stroke-width="2.5" fill="none" opacity="0.5"/>
                        <path d="M 5 5 L -5 25" stroke="#44403c" stroke-width="2" fill="none" opacity="0.4"/>
                        <path d="M -15 25 L -5 10" stroke="#44403c" stroke-width="1.5" fill="none" opacity="0.3"/>
                        <path d="M -10 -25 Q 10 -30 20 -10" stroke="#d6d3d1" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
                    </g>

                    ${waveSVG}
                    ${bubbleSVG}

                    <!-- 4. MẶT TRÊN VÀ MẶT TRƯỚC CỦA NƯỚC -->
                    <g style="transition: all 0.1s linear">
                        <polygon points="${pt(0,waterLevel,0)} ${pt(W,waterLevel,0)} ${pt(W,waterLevel,D)} ${pt(0,waterLevel,D)}" fill="#7dd3fc" opacity="0.6" stroke="#bae6fd" stroke-width="2" stroke-linejoin="round" />
                        <polygon points="${pt(0,0,0)} ${pt(W,0,0)} ${pt(W,waterLevel,0)} ${pt(0,waterLevel,0)}" fill="url(#waterGradientFront)" />
                        <polygon points="${pt(W,0,0)} ${pt(W,0,D)} ${pt(W,waterLevel,D)} ${pt(W,waterLevel,0)}" fill="#0284c7" opacity="0.4" />
                    </g>

                    <!-- 5. KHUNG VIỀN KÍNH PHÍA TRƯỚC & NHÃN ĐO -->
                    <polygon points="${pt(W,0,0)} ${pt(W,0,D)} ${pt(W,H,D)} ${pt(W,H,0)}" fill="none" stroke="#94a3b8" stroke-width="2" />
                    <polygon points="${pt(0,0,0)} ${pt(W,0,0)} ${pt(W,H,0)} ${pt(0,H,0)}" fill="url(#glassReflection)" pointer-events="none" />
                    <polygon points="${pt(0,0,0)} ${pt(W,0,0)} ${pt(W,H,0)} ${pt(0,H,0)}" fill="none" stroke="#64748b" stroke-width="4" />
                    
                    <line x1="${pX(0,H,0)}" y1="${pY(0,H,0)}" x2="${pX(0,H,D)}" y2="${pY(0,H,D)}" stroke="#94a3b8" stroke-width="3" />
                    <line x1="${pX(W,H,0)}" y1="${pY(W,H,0)}" x2="${pX(W,H,D)}" y2="${pY(W,H,D)}" stroke="#94a3b8" stroke-width="3" />
                    <line x1="${pX(0,H,D)}" y1="${pY(0,H,D)}" x2="${pX(W,H,D)}" y2="${pY(W,H,D)}" stroke="#cbd5e1" stroke-width="2" />

                    <!-- THƯỚC ĐO MỰC NƯỚC -->
                    <g class="text-sm font-bold fill-gray-700">
                        <line x1="${pX(0,3,0)-20}" y1="${pY(0,3,0)}" x2="${pX(0,3,0)}" y2="${pY(0,3,0)}" stroke="black" stroke-width="2.5" />
                        <text x="${pX(0,3,0)-65}" y="${pY(0,3,0)+5}">3 dm</text>
                        
                        <line x1="${pX(0,4,0)-20}" y1="${pY(0,4,0)}" x2="${pX(0,4,0)}" y2="${pY(0,4,0)}" stroke="#dc2626" stroke-width="2.5" />
                        <text x="${pX(0,4,0)-65}" y="${pY(0,4,0)+5}" fill="#dc2626">4 dm</text>

                        <text x="${pX(W/2, 0, 0)}" y="${pY(W/2, 0, 0) + 25}" text-anchor="middle" class="fill-slate-500 font-semibold">Dài 10 dm</text>
                        <text x="${pX(W, 0, 0.5) + 45}" y="${pY(W, 0, 0.5) + 10}" text-anchor="middle" transform="rotate(-35 ${pX(W, 0, 0.5) + 45} ${pY(W, 0, 0.5) + 10})" class="fill-slate-500 font-semibold">Rộng 6 dm</text>
                    </g>
                </svg>
            `;
        }

        // --- GÁN SỰ KIỆN (EVENTS) ---
        btnPlay.addEventListener('click', togglePlay);
        btnReset.addEventListener('click', resetSimulation);
        slider.addEventListener('input', onSliderChange);

        // --- KHỞI TẠO LẦN ĐẦU ---
        render();

    </script>
</body>
</html>
